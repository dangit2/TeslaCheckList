<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>צ'קליסט מסירת טסלה מודל 3</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #e82127;
    --text: #e8e8f0;
    --text-muted: #7070a0;
    --check: #00d4aa;
    --check-bg: rgba(0,212,170,0.08);
    --accent-en: #4f8ef7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }

  header {
    background: linear-gradient(135deg, #0a0a0f 0%, #1a0a0f 50%, #0a0a0f 100%);
    border-bottom: 1px solid var(--border);
    padding: 2rem;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px);
  }

  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .logo-area h1 {
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo-area p {
    font-size: 0.8rem;
    color: var(--text-muted);
    font-weight: 300;
    margin-top: 2px;
  }

  .progress-area {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .progress-ring-wrap {
    position: relative;
    width: 64px;
    height: 64px;
  }

  .progress-ring { transform: rotate(-90deg); }
  .progress-bg { fill: none; stroke: var(--border); stroke-width: 4; }
  .progress-bar {
    fill: none;
    stroke: var(--check);
    stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 163;
    stroke-dashoffset: 163;
    transition: stroke-dashoffset 0.6s cubic-bezier(.4,0,.2,1);
  }

  .progress-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--check);
    line-height: 1;
  }
  .progress-text span { font-size: 0.55rem; color: var(--text-muted); font-weight: 400; }

  .stats-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }

  .stat-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.25rem 0.75rem;
    font-size: 0.75rem;
    color: var(--text-muted);
  }
  .stat-pill strong { color: var(--text); }
  .stat-pill strong.done { color: var(--check); }

  .reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 8px;
    padding: 0.4rem 0.8rem;
    font-family: 'Heebo', sans-serif;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem;
  }

  /* Section group label */
  .section-group-label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 0.5rem 0 0.75rem 0;
    margin-top: 0.5rem;
  }
  .section-group-label.en {
    direction: ltr;
    text-align: left;
    color: var(--accent-en);
    font-family: 'Inter', sans-serif;
  }

  .section {
    margin-bottom: 1.5rem;
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .section.complete { border-color: rgba(0,212,170,0.3); }

  /* English section styling */
  .section.english {
    border-color: rgba(79,142,247,0.25);
    direction: ltr;
  }
  .section.english.complete { border-color: rgba(0,212,170,0.3); }

  .section-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.25rem;
    cursor: pointer;
    background: var(--surface);
    user-select: none;
    transition: background 0.2s;
  }
  .section-header:hover { background: var(--surface2); }

  .section-num {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    font-weight: 700;
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .section.english .section-num { background: var(--accent-en); font-family: 'Inter', sans-serif; }
  .section.complete .section-num { background: var(--check); }

  .section-title {
    flex: 1;
    font-size: 1rem;
    font-weight: 700;
  }
  .section.english .section-title { font-family: 'Inter', sans-serif; font-size: 0.95rem; }

  .section-meta { display: flex; align-items: center; gap: 0.75rem; }
  .section-count { font-size: 0.75rem; color: var(--text-muted); }
  .section-count .done { color: var(--check); font-weight: 700; }

  .chevron {
    color: var(--text-muted);
    font-size: 0.75rem;
    transition: transform 0.3s;
  }
  .section.collapsed .chevron { transform: rotate(180deg); }
  .section.english .chevron { transform: rotate(0deg); }
  .section.english.collapsed .chevron { transform: rotate(180deg); }

  .mini-bar {
    width: 60px;
    height: 3px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }
  .mini-bar-fill {
    height: 100%;
    background: var(--check);
    border-radius: 999px;
    transition: width 0.4s ease;
  }

  .section-body {
    border-top: 1px solid var(--border);
    background: var(--bg);
  }
  .section.collapsed .section-body { display: none; }

  /* ── Main items ── */
  .item {
    padding: 0.85rem 1.25rem;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .item:last-child { border-bottom: none; }

  .item.no-subs {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .item.no-subs:hover { background: var(--surface2); }
  .item.no-subs.checked { background: var(--check-bg); }

  .item.has-subs .item-label {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text-muted);
    padding-bottom: 0.4rem;
  }
  .section.english .item.has-subs .item-label {
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
  }

  @keyframes pop {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  .checkbox {
    width: 22px;
    height: 22px;
    border: 2px solid var(--border);
    border-radius: 6px;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s cubic-bezier(.4,0,.2,1);
    background: transparent;
  }
  .item.no-subs.checked .checkbox {
    background: var(--check);
    border-color: var(--check);
    animation: pop 0.25s ease;
  }
  .checkmark {
    opacity: 0;
    color: #000;
    font-size: 0.78rem;
    font-weight: 700;
    transition: opacity 0.15s;
  }
  .item.no-subs.checked .checkmark { opacity: 1; }

  .item-text {
    font-size: 0.875rem;
    line-height: 1.6;
    flex: 1;
    transition: color 0.2s;
  }
  .section.english .item-text { font-family: 'Inter', sans-serif; font-size: 0.85rem; }

  .item.no-subs.checked .item-text {
    color: var(--text-muted);
    text-decoration: line-through;
    text-decoration-color: rgba(0,212,170,0.4);
  }

  /* ── Sub-items ── */
  .sub-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .sub-item {
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
    padding: 0.4rem 0.5rem;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .sub-item:hover { background: rgba(255,255,255,0.04); }
  .sub-item.checked { background: rgba(0,212,170,0.07); }

  .sub-checkbox {
    width: 18px;
    height: 18px;
    border: 2px solid #3a3a5a;
    border-radius: 5px;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s cubic-bezier(.4,0,.2,1);
    background: transparent;
  }
  .sub-item.checked .sub-checkbox {
    background: var(--check);
    border-color: var(--check);
    animation: popSm 0.2s ease;
  }

  @keyframes popSm {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.4); }
    100% { transform: scale(1); }
  }

  .sub-checkmark {
    opacity: 0;
    color: #000;
    font-size: 0.65rem;
    font-weight: 700;
    transition: opacity 0.15s;
  }
  .sub-item.checked .sub-checkmark { opacity: 1; }

  .sub-text {
    font-size: 0.82rem;
    color: var(--text-muted);
    line-height: 1.55;
    flex: 1;
    transition: color 0.2s;
  }
  .section.english .sub-text { font-family: 'Inter', sans-serif; font-size: 0.8rem; }

  .sub-item.checked .sub-text {
    color: #3a3a5a;
    text-decoration: line-through;
    text-decoration-color: rgba(0,212,170,0.3);
  }

  /* ── Celebration ── */
  .celebration {
    text-align: center;
    padding: 3rem 2rem;
    display: none;
  }
  .celebration.show { display: block; animation: fadeIn 0.5s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: none; }
  }
  .celebration h2 { font-size: 2rem; font-weight: 900; margin-bottom: 0.5rem; }
  .celebration p  { color: var(--text-muted); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-area">
      <h1>🚗 צ'קליסט מסירת Model 3</h1>
      <p>Tesla Highland — בדיקה לפני חתימה + הגדרות יום 1</p>
    </div>
    <div class="progress-area">
      <div>
        <div class="stats-row" id="statsRow"></div>
      </div>
      <div class="progress-ring-wrap">
        <svg class="progress-ring" width="64" height="64" viewBox="0 0 64 64">
          <circle class="progress-bg" cx="32" cy="32" r="26"/>
          <circle class="progress-bar" id="progressBar" cx="32" cy="32" r="26"/>
        </svg>
        <div class="progress-text" id="progressText">0%<span>הושלם</span></div>
      </div>
      <button class="reset-btn" onclick="resetAll()">אפס הכל</button>
    </div>
  </div>
</header>

<main>
  <div id="checklistContainer"></div>
  <div class="celebration" id="celebration">
    <div style="font-size:4rem; margin-bottom:1rem;">🎉</div>
    <h2 style="background: linear-gradient(135deg, var(--check), #00ffcc); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">הצ'קליסט הושלם!</h2>
    <p>בדקת את כל הפריטים. נסיעה טובה! 🚗⚡</p>
  </div>
</main>

<script>
const SECTIONS = [

const STORAGE_KEY = 'tesla_checklist_v3';
let state = {};

function loadState() {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) state = JSON.parse(s); } catch(e) {}
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function getSectionKeys(si) {
  const keys = [];
  SECTIONS[si].items.forEach((item, ii) => {
    if (item.subs && item.subs.length) {
      item.subs.forEach((_, subi) => keys.push(`${si}_${ii}_${subi}`));
    } else {
      keys.push(`${si}_${ii}`);
    }
  });
  return keys;
}

function getTotalItems() {
  let n = 0;
  SECTIONS.forEach((_, si) => { n += getSectionKeys(si).length; });
  return n;
}

function getCheckedCount() {
  return Object.values(state).filter(Boolean).length;
}

function updateProgress() {
  const total = getTotalItems();
  const checked = getCheckedCount();
  const pct = total > 0 ? Math.round((checked / total) * 100) : 0;

  document.getElementById('progressBar').style.strokeDashoffset = 163 - (pct / 100) * 163;
  document.getElementById('progressText').innerHTML = `${pct}%<span>הושלם</span>`;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-pill"><strong class="done">${checked}</strong>/${total}</div>
    <div class="stat-pill"><strong>${total - checked}</strong> נותרו</div>
  `;

  if (checked === total && total > 0) document.getElementById('celebration').classList.add('show');
  else document.getElementById('celebration').classList.remove('show');

  SECTIONS.forEach((s, si) => {
    const keys = getSectionKeys(si);
    const sChecked = keys.filter(k => state[k]).length;
    const sTotal = keys.length;
    const fill = document.getElementById(`fill_${si}`);
    const count = document.getElementById(`count_${si}`);
    const sec = document.getElementById(`section_${si}`);
    if (fill) fill.style.width = (sTotal > 0 ? sChecked / sTotal * 100 : 0) + '%';
    if (count) count.innerHTML = `<span class="done">${sChecked}</span>/${sTotal}`;
    if (sec) {
      if (sChecked === sTotal && sTotal > 0) sec.classList.add('complete');
      else sec.classList.remove('complete');
    }
  });
}

function toggleItem(si, ii, event) {
  event.stopPropagation();
  const key = `${si}_${ii}`;
  state[key] = !state[key];
  saveState();
  const el = document.getElementById(`item_${si}_${ii}`);
  if (el) { if (state[key]) el.classList.add('checked'); else el.classList.remove('checked'); }
  updateProgress();
}

function toggleSub(si, ii, subi, event) {
  event.stopPropagation();
  const key = `${si}_${ii}_${subi}`;
  state[key] = !state[key];
  saveState();
  const el = document.getElementById(`sub_${si}_${ii}_${subi}`);
  if (el) { if (state[key]) el.classList.add('checked'); else el.classList.remove('checked'); }
  updateProgress();
}

function toggleSection(si) {
  const el = document.getElementById(`section_${si}`);
  if (el) el.classList.toggle('collapsed');
}

function resetAll() {
  if (!confirm('לאפס את כל הסימונים?')) return;
  state = {};
  saveState();
  document.querySelectorAll('.item.no-subs').forEach(el => el.classList.remove('checked'));
  document.querySelectorAll('.sub-item').forEach(el => el.classList.remove('checked'));
  updateProgress();
}

// Index of first English section
const FIRST_EN = SECTIONS.findIndex(s => s.english);

function render() {
  const container = document.getElementById('checklistContainer');
  container.innerHTML = '';

  // Hebrew group label
  const heLabel = document.createElement('div');
  heLabel.className = 'section-group-label';
  heLabel.textContent = '🔍 בדיקת מסירה';
  container.appendChild(heLabel);

  SECTIONS.forEach((section, si) => {
    // English group label before first English section
    if (si === FIRST_EN) {
      const enLabel = document.createElement('div');
      enLabel.className = 'section-group-label en';
      enLabel.textContent = '⚙️ Day 1 Settings';
      container.appendChild(enLabel);
    }

    const keys = getSectionKeys(si);
    const sChecked = keys.filter(k => state[k]).length;
    const sTotal = keys.length;
    const pctS = sTotal > 0 ? sChecked / sTotal * 100 : 0;
    const isEn = !!section.english;
    const isComplete = sChecked === sTotal && sTotal > 0;

    const sectionDiv = document.createElement('div');
    sectionDiv.className = 'section' + (isEn ? ' english' : '') + (isComplete ? ' complete' : '');
    sectionDiv.id = `section_${si}`;

    // Section label: use letter for English, number for Hebrew
    const numLabel = isEn ? String.fromCharCode(65 + (si - FIRST_EN)) : String(si + 1);

    const itemsHtml = section.items.map((item, ii) => {
      const hasSubs = item.subs && item.subs.length > 0;

      if (hasSubs) {
        const subsHtml = item.subs.map((sub, subi) => {
          const key = `${si}_${ii}_${subi}`;
          const cls = state[key] ? 'checked' : '';
          return `
            <div class="sub-item ${cls}" id="sub_${si}_${ii}_${subi}" onclick="toggleSub(${si},${ii},${subi},event)">
              <div class="sub-checkbox"><span class="sub-checkmark">✓</span></div>
              <div class="sub-text">${sub}</div>
            </div>`;
        }).join('');
        return `
          <div class="item has-subs">
            <div class="item-label">${item.text}</div>
            <div class="sub-list">${subsHtml}</div>
          </div>`;
      } else {
        const key = `${si}_${ii}`;
        const cls = state[key] ? 'checked' : '';
        return `
          <div class="item no-subs ${cls}" id="item_${si}_${ii}" onclick="toggleItem(${si},${ii},event)">
            <div class="checkbox"><span class="checkmark">✓</span></div>
            <div class="item-text">${item.text}</div>
          </div>`;
      }
    }).join('');

    sectionDiv.innerHTML = `
      <div class="section-header" onclick="toggleSection(${si})">
        <div class="section-num">${numLabel}</div>
        <div class="section-title">${section.title}</div>
        <div class="section-meta">
          <div class="mini-bar"><div class="mini-bar-fill" id="fill_${si}" style="width:${pctS}%"></div></div>
          <div class="section-count" id="count_${si}"><span class="done">${sChecked}</span>/${sTotal}</div>
        </div>
        <div class="chevron">▲</div>
      </div>
      <div class="section-body">${itemsHtml}</div>
    `;

    container.appendChild(sectionDiv);
  });
}

loadState();
render();
updateProgress();
</script>
</body>
</html>
